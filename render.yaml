# Render FREE — 1 instância, US$ 0/mês (não suporta 2 instâncias no plano gratuito).
# Para 2 instâncias + LB sem custo, use Fly.io: docs/DEPLOY_FREE.md

services:
  - type: web
    name: distributed-chat
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    numInstances: 1
    healthCheckPath: /health
    envVars:
      - key: REDIS_URL
        sync: false
      - key: ENABLE_TCP_SERVER
        value: "false"
      - key: HISTORY_MAX
        value: "500"
      - key: PUBSUB_CHANNEL
        value: "chat:broadcast"
