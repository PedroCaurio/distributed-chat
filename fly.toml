# fly.toml app configuration file generated for chatnet-v2 on 2026-05-17T15:06:33-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'chatnet-v2'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  HOST = '0.0.0.0'
  SERVER_HOST = '127.0.0.1'
  SERVER_PORT = '9000'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.http_options]
    [[http_service.http_options.replay_cache]]
      path_prefix = '/'
      ttl_seconds = 3600
      type = 'cookie'
      name = 'fly_machine_id'

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
