# Fly.io — deploy: docs/DEPLOY.md
# HTTP público = cliente (proxy); TCP 9000 = servidor (interno ao container)

app = 'distributed-chat-teste'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  CHAT_SERVER_HOST = '127.0.0.1'
  CHAT_SERVER_PORT = '9000'
  CHAT_HOST = '0.0.0.0'
  HISTORY_MAX = '500'
  PUBSUB_CHANNEL = 'chat:broadcast'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  # Cache de fly-replay: pinar sessão na VM que fez login (proxy TCP local)
  [[http_service.http_options.replay_cache]]
    path_prefix = '/'
    ttl_seconds = 3600
    type = 'cookie'
    name = 'fly_machine_id'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
